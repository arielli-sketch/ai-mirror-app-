<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AI 智能镜 - 扫描结果</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
            background: #000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app-container {
            width: 100%;
            max-width: 430px;
            height: 100vh;
            background: #000;
            position: relative;
            overflow: hidden;
        }

        /* 状态栏 */
        .status-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
            z-index: 100;
        }

        .time {
            font-size: 15px;
            font-weight: 600;
            color: #fff;
        }

        .status-icons {
            display: flex;
            gap: 6px;
            color: #fff;
            font-size: 14px;
        }

        /* 扫描区域 */
        .scan-area {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 280px;
            height: 360px;
        }

        /* 面部轮廓 */
        .face-outline {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .face-ellipse {
            width: 100%;
            height: 100%;
            border: 2px solid rgba(236, 72, 153, 0.3);
            border-radius: 50% 50% 45% 45%;
            position: relative;
        }

        /* 特征点 */
        .face-point {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #f472b6;
            border-radius: 50%;
            box-shadow: 0 0 12px #f472b6, 0 0 24px rgba(236, 72, 153, 0.6);
            animation: pointPulse 1.5s ease-in-out infinite;
        }

        @keyframes pointPulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.4); opacity: 0.6; }
        }

        .point-1 { top: 20%; left: 50%; transform: translateX(-50%); }
        .point-2 { top: 35%; left: 25%; animation-delay: 0.2s; }
        .point-3 { top: 35%; right: 25%; animation-delay: 0.3s; }
        .point-4 { top: 50%; left: 50%; transform: translateX(-50%); animation-delay: 0.4s; }
        .point-5 { top: 65%; left: 30%; animation-delay: 0.5s; }
        .point-6 { top: 65%; right: 30%; animation-delay: 0.6s; }
        .point-7 { top: 80%; left: 50%; transform: translateX(-50%); animation-delay: 0.7s; }

        /* 气泡提示 - 毛玻璃效果 */
        .bubble {
            position: absolute;
            top: 5%;
            left: 55%;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 18px;
            padding: 16px 20px;
            max-width: 190px;
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.5),
                inset 0 -1px 0 rgba(255, 255, 255, 0.2);
            animation: bubbleIn 0.5s ease-out 0.3s both;
        }

        @keyframes bubbleIn {
            0% {
                opacity: 0;
                transform: scale(0.8) translateY(10px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .bubble::before {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 35px;
            width: 16px;
            height: 16px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            transform: rotate(45deg);
            border-radius: 3px;
            border-right: 1px solid rgba(255, 255, 255, 0.4);
            border-bottom: 1px solid rgba(255, 255, 255, 0.4);
        }

        .bubble-icon {
            width: 30px;
            height: 30px;
            background: linear-gradient(135deg, #fb7185, #f43f5e);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            font-size: 14px;
            color: white;
            font-weight: bold;
            box-shadow: 0 4px 12px rgba(251, 113, 133, 0.4);
        }

        .bubble-title {
            font-size: 15px;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 8px;
        }

        .bubble-text {
            font-size: 13px;
            color: #4b5563;
            line-height: 1.5;
        }

        .bubble-highlight {
            color: #be123c;
            font-weight: 600;
        }

        /* 角落装饰 */
        .corner {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 2px solid rgba(236, 72, 153, 0.3);
        }

        .corner-tl {
            top: 80px;
            left: 20px;
            border-right: none;
            border-bottom: none;
        }

        .corner-tr {
            top: 80px;
            right: 20px;
            border-left: none;
            border-bottom: none;
        }

        .corner-bl {
            bottom: 80px;
            left: 20px;
            border-right: none;
            border-top: none;
        }

        .corner-br {
            bottom: 80px;
            right: 20px;
            border-left: none;
            border-top: none;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 状态栏 -->
        <div class="status-bar">
            <div class="time">10:30</div>
            <div class="status-icons">
                <span>📶</span>
                <span>🔋</span>
            </div>
        </div>

        <!-- 角落装饰 -->
        <div class="corner corner-tl"></div>
        <div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div>
        <div class="corner corner-br"></div>

        <!-- 扫描区域 -->
        <div class="scan-area">
            <!-- 气泡提示 -->
            <div class="bubble">
                <div class="bubble-icon">!</div>
                <div class="bubble-title">防晒没有抹匀</div>
                <div class="bubble-text">
                    检测到 <span class="bubble-highlight">额头左侧</span> 防晒分布不均，建议补涂
                </div>
            </div>

            <!-- 面部轮廓 -->
            <div class="face-outline">
                <div class="face-ellipse">
                    <!-- 特征点 -->
                    <div class="face-point point-1"></div>
                    <div class="face-point point-2"></div>
                    <div class="face-point point-3"></div>
                    <div class="face-point point-4"></div>
                    <div class="face-point point-5"></div>
                    <div class="face-point point-6"></div>
                    <div class="face-point point-7"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 更新时间
        function updateTime() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.querySelector('.time').textContent = `${hours}:${minutes}`;
        }
        updateTime();
        setInterval(updateTime, 1000);
    </script>
</body>
</html>
